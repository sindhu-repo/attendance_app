name: attendance_management
description: A professional attendance management application with PostgreSQL backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.6.2
  intl: ^0.20.2
  fluttertoast: ^8.2.12
  flutter_spinkit: ^5.2.1
  supabase_flutter: 2.9.1
  powersync: ^2.3.1
  uuid: ^4.5.1
  path: ^1.9.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
